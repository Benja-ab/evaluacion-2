<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js"></script>
</head>

<body id="body" class="novela-mode">

<div class="container my-5">

  <h2 id="titulo" class="text-center mb-4 text-white">
    Registro de lectura de Novelas
  </h2>

  <form class="mx-auto p-4 rounded formulario novela-form">

    <div class="mb-3">
      <label class="form-label">Nombre del usuario</label>
      <input type="text" id="nombre" class="form-control">
    </div>

    <div class="mb-3">
      <label id="labelContenido" class="form-label">Nombre de la novela</label>
      <input type="text" id="contenido" class="form-control">
    </div>

    <div class="form-check">
      <input type="checkbox" id="check1" class="form-check-input">
      <label id="labelCheck1" class="form-check-label">He leído este contenido</label>
    </div>

    <div class="form-check mb-3">
      <input type="checkbox" id="check2" class="form-check-input">
      <label class="form-check-label">Lo recomendaría</label>
    </div>

    <div class="mb-3">
      <label class="form-label">Género</label>
      <select id="genero" class="form-select">
        <option value="">Selecciona...</option>
        <option>Comedia</option>
        <option>Romance</option>
        <option>Drama</option>
        <option>Terror</option>
        <option>Acción</option>
        <option>Fantasía</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Fecha de inicio</label>
      <input type="date" id="inicio" class="form-control mb-2">

      <label>Fecha de término</label>
      <input type="date" id="fin" class="form-control">
    </div>


    <button type="button" onclick="validarFormulario()" class="btn btn-outline-info w-100 mb-2">
      Registrar
    </button>

    <button type="button" onclick="validarFechas()" class="btn btn-outline-warning w-100 mb-2">
      Verificar fechas
    </button>

    <button type="button" onclick="cambiarModo()" class="btn btn-outline-light w-100">
      Cambiar formulario
    </button>

  </form>

</div>

</body>
</html>
