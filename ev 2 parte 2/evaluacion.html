<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Lectura</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>



</head>
<body class="bg-dark text-white">

<div class="container mt-5">

  <!-- Título -->
  <h1 class="text-center mb-4">📚 Registro de Libros</h1>

  <!-- FORMULARIO -->
  <div class="card p-4 bg-secondary">
    <h3>Datos del lector</h3>

    <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre del lector">

    <input type="text" id="libro" class="form-control mb-3" placeholder="Nombre del libro">

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="check1">
      <label class="form-check-label">Me gusta leer novelas</label>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="check2">
      <label class="form-check-label">Recomiendo este libro</label>
    </div>

    <select id="genero" class="form-select mb-3">
      <option value="">Seleccione género</option>
      <option>Wuxia</option>
      <option>Romance</option>
      <option>Terror</option>
    </select>

    <button class="btn btn-primary" onclick="validarFormulario()">Registrar</button>
  </div>

  <!-- FECHAS -->
  <div class="card p-4 mt-4 bg-secondary">
    <h3>Fechas de lectura</h3>

    <label>Inicio</label>
    <input type="date" id="inicio" class="form-control mb-3">

    <label>Fin</label>
    <input type="date" id="fin" class="form-control mb-3">

    <button class="btn btn-warning" onclick="validarFechas()">Verificar</button>
  </div>

  <div class="card p-4 mt-4 bg-secondary text-center">
  <h3>Modo de lectura</h3>

  <div id="imagenModo" class="p-4 bg-dark text-white rounded card-dinamica">
    📖 Modo Novela
  </div>

  <button class="btn btn-danger mt-2" onclick="modoAnime()">Anime</button>
  <button class="btn btn-dark mt-2" onclick="modoManga()">Manga</button>
  <button class="btn btn-info mt-2" onclick="modoManwha()">Manwha</button>

</div>

</div>


</body>
</html>
